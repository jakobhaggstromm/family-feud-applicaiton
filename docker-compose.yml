services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      FAMILY_FEUD_ADMIN_PASSWORD: ${FAMILY_FEUD_ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
